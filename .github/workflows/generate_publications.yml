name: Generate Publications

on:
  push:
    paths:
      - 'publications.bib'   # runs when you edit the .bib file
      - 'index.html'          # also runs if you edit the HTML directly
    branches:
      - main                  # change to 'master' if your default branch is master

  workflow_dispatch:          # allows manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write         # needed to commit the updated index.html back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install bibtexparser

      - name: Run generate_publications.py
        run: python generate_publications.py

      - name: Commit updated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # only commit if index.html actually changed
          git diff --cached --quiet || git commit -m "Auto-update publications from publications.bib [skip ci]"
          git push
